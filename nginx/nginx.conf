worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile        on;
    keepalive_timeout 65;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    upstream bot_upstream {
        server bot:8000;
    }

    server {
        listen 80;
        server_name prompt-bot.vlessgroup.ru;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name prompt-bot.vlessgroup.ru;

        ssl_certificate     /etc/letsencrypt/live/prompt-bot.vlessgroup.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/prompt-bot.vlessgroup.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 10m;

        location /telegram/webhook {
            proxy_pass         http://bot_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /yookassa/webhook {
            proxy_pass         http://bot_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location / {
            return 444;
        }
    }
}
